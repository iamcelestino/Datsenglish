  <path d="M18 20 L32 32 L18 44" fill="none" stroke="#C8FF03" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="36" y="39" width="15" height="6" rx="2" fill="#6E8CFF"/>

  <!-- wordmark -->
  <text x="80" y="43" font-family="'Space Grotesk', sans-serif" font-weight="800" font-size="34" letter-spacing="-0.5">
    <tspan fill="#6E8CFF">dats</tspan><tspan fill="#C8FF03">english</tspan>
  </text>
</svg>
